<!DOCTYPE html>
<html lang="pt-br">

<head>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      -webkit-tap-highlight-color: transparent;
    }
  </style>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ContabilEasy</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="theme-color" content="#080c14" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ContabilEasy" />
  <link rel="apple-touch-icon" href="/icon.svg" />

  <!-- SEO / Open Graph -->
  <meta name="description" content="Controle financeiro pessoal simples e eficiente" />
  <meta property="og:title" content="ContabilEasy" />
  <meta property="og:description" content="Controle financeiro pessoal" />
  <meta property="og:type" content="website" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then(r => console.log("[PWA] SW registrado:", r.scope))
          .catch(e => console.warn("[PWA] SW falhou:", e));
      });
    }
  </script>
</body>

</html>
